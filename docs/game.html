<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星尘编年史 - 文字冒险游戏</title>
  <style>
    /* ========== 全局样式 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a1a;
      --bg-secondary: #12122a;
      --text-primary: #e0e0ff;
      --text-secondary: #8888aa;
      --accent: #7c5cff;
      --accent-glow: rgba(124, 92, 255, 0.4);
      --gold: #ffd700;
      --danger: #ff4757;
      --success: #2ed573;
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ========== 粒子背景 ========== */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      animation: float 15s infinite ease-in-out;
      opacity: 0.6;
    }

    @keyframes float {
      0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-100px) scale(1); opacity: 0; }
    }

    /* ========== 容器 ========== */
    .container {
      position: relative;
      z-index: 1;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ========== 标题画面 ========== */
    #title-screen {
      text-align: center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .game-title {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px var(--accent-glow);
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 10px var(--accent-glow)); }
      to { filter: drop-shadow(0 0 20px var(--accent-glow)); }
    }

    .game-subtitle {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: 50px;
      letter-spacing: 3px;
    }

    /* ========== 输入框 ========== */
    .input-group {
      margin-bottom: 30px;
    }

    .input-group label {
      display: block;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .input-group input {
      width: 100%;
      max-width: 300px;
      padding: 12px 20px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 1rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    /* ========== 按钮 ========== */
    .btn {
      padding: 14px 40px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9d7cff);
      color: white;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 30px var(--accent-glow);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--text-secondary);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-small {
      padding: 8px 20px;
      font-size: 0.85rem;
    }

    /* ========== 游戏界面 ========== */
    #game-screen {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(124, 92, 255, 0.3);
    }

    .player-stats {
      display: flex;
      gap: 20px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }

    .stat-icon {
      font-size: 1.1rem;
    }

    .stat-value {
      color: var(--gold);
      font-weight: bold;
    }

    .menu-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
      transition: color 0.3s;
    }

    .menu-btn:hover {
      color: var(--accent);
    }

    /* ========== 场景内容 ========== */
    .scene-container {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
      min-height: 200px;
      border: 1px solid rgba(124, 92, 255, 0.2);
    }

    .scene-title {
      color: var(--accent);
      font-size: 1.3rem;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(124, 92, 255, 0.2);
    }

    .scene-text {
      line-height: 1.8;
      font-size: 1.05rem;
      white-space: pre-wrap;
    }

    .scene-text .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--accent);
      animation: blink 1s infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* ========== 选择按钮 ========== */
    .choices-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      width: 100%;
      padding: 16px 24px;
      border: 2px solid rgba(124, 92, 255, 0.3);
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateX(-20px);
    }

    .choice-btn.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .choice-btn:hover {
      border-color: var(--accent);
      background: rgba(124, 92, 255, 0.1);
      transform: translateX(10px);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .choice-btn .choice-text {
      display: block;
      margin-bottom: 4px;
    }

    .choice-btn .choice-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* ========== 菜单模态框 ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-secondary);
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      border: 1px solid var(--accent);
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-title {
      font-size: 1.5rem;
      margin-bottom: 25px;
      text-align: center;
      color: var(--accent);
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
    }

    /* ========== 存档槽位 ========== */
    .save-slot {
      background: var(--bg-primary);
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .save-slot:hover {
      border-color: var(--accent);
    }

    .save-slot.empty {
      opacity: 0.5;
      border-style: dashed;
    }

    .save-slot-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .save-slot-title {
      font-weight: bold;
    }

    .save-slot-date {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .save-slot-info {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* ========== 成就通知 ========== */
    .achievement-toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: linear-gradient(135deg, var(--bg-secondary), var(--bg-primary));
      border: 2px solid var(--gold);
      border-radius: 12px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideInRight 0.5s ease, fadeOut 0.5s ease 3s forwards;
      z-index: 200;
    }

    @keyframes slideInRight {
      from { transform: translateX(100px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(100px); }
    }

    .achievement-icon {
      font-size: 2rem;
    }

    .achievement-text {
      font-size: 0.9rem;
    }

    .achievement-text small {
      display: block;
      color: var(--gold);
      font-weight: bold;
      margin-bottom: 2px;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 600px) {
      .game-title { font-size: 2rem; }
      .container { padding: 15px; }
      .scene-container { padding: 20px; }
      .player-stats { gap: 12px; }
      .stat { font-size: 0.75rem; }
      .choice-btn { padding: 14px 18px; font-size: 0.95rem; }
    }

    /* ========== 工具类 ========== */
    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .mt-20 { margin-top: 20px; }
    .mb-20 { margin-bottom: 20px; }
  </style>
</head>
<body>
  <!-- 粒子背景 -->
  <div id="particles"></div>

  <!-- 标题画面 -->
  <div class="container" id="title-screen">
    <h1 class="game-title">星尘编年史</h1>
    <p class="game-subtitle">— 记忆编织者的旅程 —</p>

    <div class="input-group">
      <label for="player-name">为你的角色命名</label>
      <input type="text" id="player-name" placeholder="输入名字..." maxlength="10" value="旅行者">
    </div>

    <div>
      <button class="btn btn-primary" onclick="startGame()">开始旅程</button>
    </div>
    <div class="mt-20">
      <button class="btn btn-secondary" onclick="showLoadModal()">继续旅程</button>
    </div>
  </div>

  <!-- 游戏主界面 -->
  <div class="container" id="game-screen">
    <div class="game-header">
      <div class="player-stats">
        <div class="stat">
          <span class="stat-icon">🧠</span>
          <span>智慧:</span>
          <span class="stat-value" id="stat-wisdom">5</span>
        </div>
        <div class="stat">
          <span class="stat-icon">⚔️</span>
          <span>勇气:</span>
          <span class="stat-value" id="stat-courage">5</span>
        </div>
        <div class="stat">
          <span class="stat-icon">💜</span>
          <span>同理心:</span>
          <span class="stat-value" id="stat-empathy">5</span>
        </div>
      </div>
      <button class="menu-btn" onclick="showMenu()">☰</button>
    </div>

    <div class="scene-container">
      <h2 class="scene-title" id="scene-title">序章</h2>
      <div class="scene-text" id="scene-text"></div>
    </div>

    <div class="choices-container" id="choices-container"></div>
  </div>

  <!-- 菜单模态框 -->
  <div class="modal" id="menu-modal">
    <div class="modal-content">
      <h3 class="modal-title">游戏菜单</h3>
      <div class="text-center">
        <button class="btn btn-primary btn-small" onclick="showSaveModal()">保存游戏</button>
        <button class="btn btn-primary btn-small" onclick="showLoadModal()">读取存档</button>
        <button class="btn btn-secondary btn-small" onclick="showAchievements()">成就</button>
        <button class="btn btn-secondary btn-small" onclick="exportSave()">导出存档</button>
        <button class="btn btn-secondary btn-small" onclick="importSave()">导入存档</button>
        <button class="btn btn-secondary btn-small" onclick="returnToTitle()">返回标题</button>
        <button class="btn btn-secondary btn-small" onclick="closeModals()">关闭</button>
      </div>
    </div>
  </div>

  <!-- 存档模态框 -->
  <div class="modal" id="save-modal">
    <div class="modal-content">
      <h3 class="modal-title" id="save-modal-title">保存游戏</h3>
      <div id="save-slots"></div>
      <div class="text-center mt-20">
        <button class="btn btn-secondary btn-small" onclick="closeModals()">取消</button>
      </div>
    </div>
  </div>

  <!-- 成就模态框 -->
  <div class="modal" id="achievement-modal">
    <div class="modal-content">
      <h3 class="modal-title">成就收集</h3>
      <div id="achievement-list"></div>
      <div class="text-center mt-20">
        <button class="btn btn-secondary btn-small" onclick="closeModals()">关闭</button>
      </div>
    </div>
  </div>

  <script>
    // ========== 游戏引擎核心 ==========
    class GameEngine {
      constructor() {
        this.currentScene = 'start';
        this.player = {
          name: '旅行者',
          stats: { wisdom: 5, courage: 5, empathy: 5 },
          inventory: [],
          flags: {},
          relationships: {}
        };
        this.history = [];
        this.achievements = this.loadAchievements();
        this.isTyping = false;
        this.typewriterTimeout = null;
      }

      // 修改属性
      modifyStat(stat, amount) {
        if (this.player.stats[stat] !== undefined) {
          this.player.stats[stat] = Math.max(0, Math.min(20, this.player.stats[stat] + amount));
          this.updateStatsDisplay();
        }
      }

      // 设置标记
      setFlag(flag, value = true) {
        this.player.flags[flag] = value;
      }

      // 检查条件
      checkCondition(condition) {
        if (!condition) return true;
        if (condition.minStat) {
          for (const [stat, value] of Object.entries(condition.minStat)) {
            if (this.player.stats[stat] < value) return false;
          }
        }
        if (condition.hasFlag) {
          for (const flag of condition.hasFlag) {
            if (!this.player.flags[flag]) return false;
          }
        }
        if (condition.notFlag) {
          for (const flag of condition.notFlag) {
            if (this.player.flags[flag]) return false;
          }
        }
        return true;
      }

      // 应用效果
      applyEffects(effects) {
        if (!effects) return;
        if (effects.wisdom) this.modifyStat('wisdom', effects.wisdom);
        if (effects.courage) this.modifyStat('courage', effects.courage);
        if (effects.empathy) this.modifyStat('empathy', effects.empathy);
        if (effects.flags) {
          Object.entries(effects.flags).forEach(([flag, value]) => {
            this.setFlag(flag, value);
          });
        }
        if (effects.achievement) {
          this.unlockAchievement(effects.achievement);
        }
      }

      // 更新属性显示
      updateStatsDisplay() {
        document.getElementById('stat-wisdom').textContent = this.player.stats.wisdom;
        document.getElementById('stat-courage').textContent = this.player.stats.courage;
        document.getElementById('stat-empathy').textContent = this.player.stats.empathy;
      }

      // 解锁成就
      unlockAchievement(id) {
        if (!this.achievements.includes(id)) {
          this.achievements.push(id);
          localStorage.setItem('stardust_achievements', JSON.stringify(this.achievements));
          showAchievementToast(id);
        }
      }

      // 加载成就
      loadAchievements() {
        const saved = localStorage.getItem('stardust_achievements');
        return saved ? JSON.parse(saved) : [];
      }

      // 保存游戏
      saveGame(slot) {
        const saveData = {
          scene: this.currentScene,
          player: JSON.parse(JSON.stringify(this.player)),
          history: [...this.history],
          timestamp: new Date().toLocaleString('zh-CN'),
          chapter: STORY.scenes[this.currentScene]?.title || '未知'
        };
        localStorage.setItem(`stardust_save_${slot}`, JSON.stringify(saveData));
        return saveData;
      }

      // 加载游戏
      loadGame(slot) {
        const saved = localStorage.getItem(`stardust_save_${slot}`);
        if (saved) {
          const data = JSON.parse(saved);
          this.currentScene = data.scene;
          this.player = data.player;
          this.history = data.history || [];
          this.updateStatsDisplay();
          this.loadScene(this.currentScene);
          return true;
        }
        return false;
      }

      // 导出存档
      exportData() {
        return btoa(JSON.stringify({
          scene: this.currentScene,
          player: this.player,
          history: this.history,
          achievements: this.achievements
        }));
      }

      // 导入存档
      importData(data) {
        try {
          const decoded = JSON.parse(atob(data));
          this.currentScene = decoded.scene;
          this.player = decoded.player;
          this.history = decoded.history || [];
          this.achievements = decoded.achievements || [];
          localStorage.setItem('stardust_achievements', JSON.stringify(this.achievements));
          this.updateStatsDisplay();
          this.loadScene(this.currentScene);
          return true;
        } catch (e) {
          return false;
        }
      }

      // 加载场景
      async loadScene(sceneId) {
        const scene = STORY.scenes[sceneId];
        if (!scene) {
          console.error('Scene not found:', sceneId);
          return;
        }

        this.currentScene = sceneId;
        this.history.push(sceneId);

        // 检查场景前置条件
        if (scene.condition && !this.checkCondition(scene.condition)) {
          this.loadScene(scene.fallback || 'default');
          return;
        }

        // 应用场景效果
        if (scene.effects) {
          this.applyEffects(scene.effects);
        }

        // 渲染场景
        await ui.renderScene(scene);
      }

      // 做出选择
      async makeChoice(choiceIndex) {
        const scene = STORY.scenes[this.currentScene];
        if (!scene || !scene.choices[choiceIndex]) return;

        const choice = scene.choices[choiceIndex];

        // 检查选择条件
        if (!this.checkCondition(choice.condition)) {
          return;
        }

        // 应用选择效果
        this.applyEffects(choice.effects);

        // 跳转到下一场景
        if (choice.next) {
          this.loadScene(choice.next);
        }
      }
    }

    // ========== 故事数据 ==========
    const STORY = {
      scenes: {
        // ===== 序章 =====
        'start': {
          title: '序章：觉醒',
          text: `你缓缓睁开眼睛，映入眼帘的是一片陌生的天花板。

空气中弥漫着淡淡的星尘气息，墙壁上闪烁着微弱的符文光芒。你感觉到一股温暖的力量在体内流动，仿佛有什么东西正在苏醒。

"你终于醒了。"

一个声音从房间的角落传来。你转头看去，只见一位白发老者正坐在窗边，窗外是漫天的星辰。

"我是长老艾尔文，这里是星尘圣殿。你...是被选中的人。"`,
          choices: [
            {
              text: '"被选中？什么意思？"',
              hint: '了解更多 [智慧+1]',
              next: 'explain',
              effects: { wisdom: 1 }
            },
            {
              text: '警惕地后退，保持距离',
              hint: '保持谨慎 [勇气+1]',
              next: 'cautious',
              effects: { courage: 1 }
            },
            {
              text: '感受体内的力量，尝试引导它',
              hint: '探索力量 [同理心+1]',
              next: 'feel_power',
              effects: { empathy: 1 }
            }
          ]
        },

        'explain': {
          title: '序章：觉醒',
          text: `艾尔文长老叹了口气，缓缓站起身来。

"这个世界正在崩塌。记忆碎片散落在各个角落，黑暗正在吞噬一切。而你...是唯一能够编织记忆、修复世界线的人。"

他走到窗边，指着远方一片黑暗的区域。

"那里，曾经是最繁华的城市。现在...只剩下无尽的虚空。"

"你需要穿越不同的记忆碎片，收集星尘，修复这个世界的裂痕。但要小心...每一段记忆都有它的守护者。"`,
          choices: [
            {
              text: '"我愿意承担这个使命。"',
              hint: '接受命运 [勇气+1]',
              next: 'accept_mission',
              effects: { courage: 1, flags: { accepted: true } }
            },
            {
              text: '"我需要更多时间考虑。"',
              hint: '谨慎思考 [智慧+1]',
              next: 'think_more',
              effects: { wisdom: 1 }
            }
          ]
        },

        'cautious': {
          title: '序章：觉醒',
          text: `你警惕地后退了几步，目光紧盯着眼前的老人。

银推开门，示意你进去。

"城主在里面等你。"他说。"祝你好运...编织者。"

你深吸一口气，走了进去...

（第一幕完）`,
          choices: [
            {
              text: '返回标题画面',
              hint: '结束游戏',
              next: 'start'
            }
          ]
        },

        // ===== 默认场景 =====
        'default': {
          title: '未知之地',
          text: `你发现自己来到了一个陌生的地方。

周围是一片虚无，只有远处闪烁的星光。

"看来...你走错了路。"一个声音响起。

"但这没关系...每一条路都有它的意义。"

你感觉到一股力量在引导你...`,
          choices: [
            {
              text: '返回开始',
              hint: '重新开始',
              next: 'start'
            }
          ]
        }
      }
    };

    // ========== UI 控制器 ==========
    const ui = {
      // 打字机效果
      async typeWriter(text, element, speed = 30) {
        return new Promise((resolve) => {
          engine.isTyping = true;
          element.innerHTML = '';
          let index = 0;
          const cursor = document.createElement('span');
          cursor.className = 'cursor';

          const type = () => {
            if (index < text.length) {
              // 处理换行符
              if (text[index] === '\n') {
                element.appendChild(document.createElement('br'));
              } else {
                element.appendChild(document.createTextNode(text[index]));
              }
              element.appendChild(cursor);
              index++;
              engine.typewriterTimeout = setTimeout(type, speed);
            } else {
              cursor.remove();
              engine.isTyping = false;
              resolve();
            }
          };

          // 点击跳过
          const skipHandler = () => {
            if (engine.isTyping) {
              clearTimeout(engine.typewriterTimeout);
              element.innerHTML = text.replace(/\n/g, '<br>');
              engine.isTyping = false;
              resolve();
            }
            element.removeEventListener('click', skipHandler);
          };
          element.addEventListener('click', skipHandler);

          type();
        });
      },

      // 渲染场景
      async renderScene(scene) {
        const titleEl = document.getElementById('scene-title');
        const textEl = document.getElementById('scene-text');
        const choicesEl = document.getElementById('choices-container');

        // 更新标题
        titleEl.textContent = scene.title;

        // 清空选择
        choicesEl.innerHTML = '';

        // 打字机效果显示文本
        await this.typeWriter(scene.text, textEl);

        // 显示选择
        if (scene.choices && scene.choices.length > 0) {
          scene.choices.forEach((choice, index) => {
            // 检查条件
            if (!engine.checkCondition(choice.condition)) return;

            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerHTML = `
              <span class="choice-text">${choice.text}</span>
              ${choice.hint ? `<span class="choice-hint">${choice.hint}</span>` : ''}
            `;
            btn.onclick = () => engine.makeChoice(index);

            choicesEl.appendChild(btn);

            // 动画延迟显示
            setTimeout(() => btn.classList.add('visible'), 100 * (index + 1));
          });
        }
      },

      // 创建粒子
      createParticles() {
        const container = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.animationDelay = Math.random() * 15 + 's';
          particle.style.animationDuration = (10 + Math.random() * 10) + 's';
          container.appendChild(particle);
        }
      }
    };

    // ========== 全局函数 ==========

    // 初始化引擎
    const engine = new GameEngine();

    // 开始游戏
    function startGame() {
      const nameInput = document.getElementById('player-name');
      engine.player.name = nameInput.value || '旅行者';

      document.getElementById('title-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'block';

      engine.loadScene('start');
    }

    // 显示菜单
    function showMenu() {
      document.getElementById('menu-modal').classList.add('active');
    }

    // 显示存档界面
    function showSaveModal(isLoad = false) {
      const modal = document.getElementById('save-modal');
      const title = document.getElementById('save-modal-title');
      const slotsContainer = document.getElementById('save-slots');

      title.textContent = isLoad ? '读取存档' : '保存游戏';

      slotsContainer.innerHTML = '';

      for (let i = 0; i < 3; i++) {
        const saved = localStorage.getItem(`stardust_save_${i}`);
        const slot = document.createElement('div');
        slot.className = 'save-slot' + (saved ? '' : ' empty');

        if (saved) {
          const data = JSON.parse(saved);
          slot.innerHTML = `
            <div class="save-slot-header">
              <span class="save-slot-title">存档 ${i + 1}</span>
              <span class="save-slot-date">${data.timestamp}</span>
            </div>
            <div class="save-slot-info">
              ${data.player.name} | ${data.chapter} | 智慧${data.player.stats.wisdom} 勇气${data.player.stats.courage} 同理心${data.player.stats.empathy}
            </div>
          `;
        } else {
          slot.innerHTML = `
            <div class="save-slot-header">
              <span class="save-slot-title">存档 ${i + 1}</span>
            </div>
            <div class="save-slot-info">空存档</div>
          `;
        }

        slot.onclick = () => {
          if (isLoad) {
            if (saved) {
              engine.loadGame(i);
              closeModals();
              document.getElementById('title-screen').style.display = 'none';
              document.getElementById('game-screen').style.display = 'block';
            }
          } else {
            engine.saveGame(i);
            showSaveModal(false);
          }
        };

        slotsContainer.appendChild(slot);
      }

      closeModals();
      modal.classList.add('active');
    }

    // 显示加载界面
    function showLoadModal() {
      showSaveModal(true);
    }

    // 显示成就
    function showAchievements() {
      const modal = document.getElementById('achievement-modal');
      const list = document.getElementById('achievement-list');

      const allAchievements = [
        { id: 'first_resonance', name: '初次共鸣', desc: '第一次与星尘产生共鸣', icon: '✨' },
        { id: 'helper_of_lost', name: '迷途者的引路人', desc: '帮助小雨找到姐姐', icon: '🌟' },
        { id: 'sisters_reunited', name: '重逢', desc: '让姐妹团聚', icon: '💕' },
        { id: 'truth_seeker', name: '真相探寻者', desc: '质疑记忆的真实性', icon: '🔍' },
        { id: 'memory_sharer', name: '记忆分享者', desc: '与守护者分享记忆', icon: '📖' },
        { id: 'wise_one', name: '智者', desc: '用智慧说服守护者', icon: '🧠' },
        { id: 'song_lover', name: '聆听者', desc: '聆听歌者的旋律', icon: '🎵' },
        { id: 'chapter1_clear', name: '启程', desc: '完成第一章', icon: '🗺️' },
      ];

      list.innerHTML = allAchievements.map(a => `
        <div class="save-slot ${engine.achievements.includes(a.id) ? '' : 'empty'}">
          <div class="save-slot-header">
            <span class="save-slot-title">${a.icon} ${a.name}</span>
            <span class="save-slot-date">${engine.achievements.includes(a.id) ? '已解锁' : '未解锁'}</span>
          </div>
          <div class="save-slot-info">${a.desc}</div>
        </div>
      `).join('');

      closeModals();
      modal.classList.add('active');
    }

    // 导出存档
    function exportSave() {
      const data = engine.exportData();
      navigator.clipboard.writeText(data).then(() => {
        alert('存档已复制到剪贴板！');
      }).catch(() => {
        prompt('请手动复制以下存档代码：', data);
      });
    }

    // 导入存档
    function importSave() {
      const data = prompt('请粘贴存档代码：');
      if (data) {
        if (engine.importData(data)) {
          alert('存档导入成功！');
          document.getElementById('title-screen').style.display = 'none';
          document.getElementById('game-screen').style.display = 'block';
        } else {
          alert('存档导入失败！');
        }
      }
    }

    // 返回标题
    function returnToTitle() {
      if (confirm('确定要返回标题画面吗？未保存的进度将丢失。')) {
        closeModals();
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('title-screen').style.display = 'block';
      }
    }

    // 关闭所有模态框
    function closeModals() {
      document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    }

    // 显示成就通知
    function showAchievementToast(achievementId) {
      const allAchievements = {
        'first_resonance': { name: '初次共鸣', icon: '✨' },
        'helper_of_lost': { name: '迷途者的引路人', icon: '🌟' },
        'sisters_reunited': { name: '重逢', icon: '💕' },
        'truth_seeker': { name: '真相探寻者', icon: '🔍' },
        'memory_sharer': { name: '记忆分享者', icon: '📖' },
        'wise_one': { name: '智者', icon: '🧠' },
        'song_lover': { name: '聆听者', icon: '🎵' },
        'chapter1_clear': { name: '启程', icon: '🗺️' },
      };

      const achievement = allAchievements[achievementId];
      if (!achievement) return;

      const toast = document.createElement('div');
      toast.className = 'achievement-toast';
      toast.innerHTML = `
        <span class="achievement-icon">${achievement.icon}</span>
        <span class="achievement-text">
          <small>成就解锁</small>
          ${achievement.name}
        </span>
      `;
      document.body.appendChild(toast);

      setTimeout(() => toast.remove(), 4000);
    }

    // 初始化
    ui.createParticles();

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeModals();
      }
    });
  </script>
</body>
</html>
