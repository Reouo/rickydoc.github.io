<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星尘编年史 - 文字冒险游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a1a;
      --text-primary: #e0e0ff;
      --accent: #7c5cff;
      --gold: #ffd700;
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* 星空背景 */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px;
      max-width: 600px;
      width: 90%;
    }

    /* 标题 */
    .title {
      font-size: 3.5rem;
      font-weight: bold;
      margin-bottom: 15px;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { filter: drop-shadow(0 0 10px rgba(124, 92, 255, 0.4)); }
      to { filter: drop-shadow(0 0 30px rgba(124, 92, 255, 0.6)); }
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.6);
      font-size: 1.1rem;
      margin-bottom: 40px;
      letter-spacing: 3px;
    }

    /* 描述 */
    .description {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 50px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      border: 1px solid rgba(124, 92, 255, 0.2);
    }

    /* 按钮 */
    .btn {
      display: inline-block;
      padding: 18px 60px;
      background: linear-gradient(135deg, var(--accent), #9d7cff);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 30px rgba(124, 92, 255, 0.4);
    }

    .btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 40px rgba(124, 92, 255, 0.6);
    }

    /* 特性列表 */
    .features {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 50px;
      flex-wrap: wrap;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.9rem;
    }

    .feature-icon {
      font-size: 1.3rem;
    }

    /* 底部 */
    .footer {
      position: fixed;
      bottom: 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.8rem;
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .title { font-size: 2.2rem; }
      .container { padding: 20px; }
      .btn { padding: 15px 40px; font-size: 1rem; }
      .features { gap: 15px; }
    }
  </style>
</head>
<body>
  <!-- 星空背景 -->
  <div class="stars" id="stars"></div>

  <!-- 主内容 -->
  <div class="container">
    <h1 class="title">星尘编年史</h1>
    <p class="subtitle">— 记忆编织者的旅程 —</p>

    <div class="description">
      在一个魔法与科技交织的世界，你是一名年轻的"记忆编织者"。<br>
      穿越不同的记忆碎片，修复被黑暗侵蚀的世界线。<br>
      每一个选择，都将影响世界的命运...
    </div>

    <a href="game.html" class="btn">开始旅程</a>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">📖</span>
        <span>沉浸式叙事</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🔀</span>
        <span>多分支剧情</span>
      </div>
      <div class="feature">
        <span class="feature-icon">💾</span>
        <span>存档系统</span>
      </div>
      <div class="feature">
        <span class="feature-icon">🏆</span>
        <span>成就收集</span>
      </div>
    </div>
  </div>

  <div class="footer">星尘编年史 © 2026</div>

  <script>
    // 创建星空背景
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      star.style.animationDuration = (2 + Math.random() * 3) + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
